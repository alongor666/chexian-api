<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>签单业绩分析看板</title>

    <!-- ========== 性能优化：资源预加载（Phase 5）========== -->
    <!-- 预加载关键 JS chunk（生产构建时生效） -->
    <!-- 注意：开发模式下这些文件不存在，浏览器会静默忽略 -->
    <link rel="modulepreload" href="/assets/vendor-react.js" />
    <link rel="modulepreload" href="/assets/vendor-echarts.js" />

    <!-- DNS 预解析：减少外部 API 首次连接延迟 -->
    <link rel="dns-prefetch" href="https://open.bigmodel.cn" />
    <link rel="preconnect" href="https://open.bigmodel.cn" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
