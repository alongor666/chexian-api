name: Promote cx-cli release tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '单调递增的发布标签（必须与 cli/package.json 一致，例如 v1.1.0）'
        required: true
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.CX_CLI_SYNC_TOKEN }}
      RELEASE_TAG: ${{ inputs.tag }}
      MIRROR_REPO: alongor666/cx-cli
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify source version and monotonic tag
        working-directory: cli
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          VERSION="$(node -p 'require("./package.json").version')"
          test "v${VERSION}" = "$RELEASE_TAG"
          test "$RELEASE_TAG" != 'v1.0.0'
          LATEST_TAG="$(gh api "repos/${MIRROR_REPO}/releases/latest" --jq .tag_name)"
          export VERSION LATEST_TAG
          node -e '
            const parse = (v) => v.replace(/^v/, "").split(".").map(Number);
            const next = parse(process.env.VERSION);
            const latest = parse(process.env.LATEST_TAG);
            if (next.length !== 3 || latest.length !== 3 || next.some(Number.isNaN) || latest.some(Number.isNaN)) process.exit(2);
            const newer = next.some((n, i) => n > latest[i] && next.slice(0, i).every((x, j) => x === latest[j]));
            if (!newer) throw new Error(`release v${process.env.VERSION} must be newer than ${process.env.LATEST_TAG}`);
          '

      - name: Verify mirror contains the exact synced CLI source
        run: |
          set -euo pipefail
          SOURCE_CLI_COMMIT="$(git log -1 --format=%H -- cli/)"
          MIRROR_SOURCE_COMMIT="$(gh api "repos/${MIRROR_REPO}/contents/source-commit.txt?ref=main" --jq .content | base64 --decode | tr -d '\r\n')"
          MIRROR_VERSION="$(gh api "repos/${MIRROR_REPO}/contents/package.json?ref=main" --jq .content | base64 --decode | node -p 'JSON.parse(require("fs").readFileSync(0, "utf8")).version')"
          test "$SOURCE_CLI_COMMIT" = "$MIRROR_SOURCE_COMMIT"
          test "v${MIRROR_VERSION}" = "$RELEASE_TAG"

      - name: Create immutable tag on mirror main
        run: |
          set -euo pipefail
          if gh api "repos/${MIRROR_REPO}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::tag ${RELEASE_TAG} already exists"
            exit 1
          fi
          MIRROR_SHA="$(gh api "repos/${MIRROR_REPO}/commits/main" --jq .sha)"
          gh api --method POST "repos/${MIRROR_REPO}/git/refs" \
            -f ref="refs/tags/${RELEASE_TAG}" \
            -f sha="$MIRROR_SHA"
          echo "::notice::tagged ${MIRROR_REPO}@${MIRROR_SHA}; mirror release workflow is the sole publisher"
