name: Deploy to VPS

on:
  # 仅在 Production Gate 通过后才部署，避免带病上线
  workflow_run:
    workflows: ["Production Gate"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

# 部署序列化锁（BACKLOG 2026-07-04-claude-6a2238）：
# 2026-07-04 三 PR 连续合并触发 3 个并发 Deploy run，在同一 VPS 上
# rm -rf dist / npm ci / reload 互相踩踏，三次全部失败回滚、生产 502 窗口拉长。
# cancel-in-progress 必须为 false：部署脚本不可中途取消（半升级状态），
# running 的 run 跑完整；同 group 排队中（pending）的 run 由 GitHub 只保留
# 最新一个，旧 pending 自动作废 → 连续合并最终只部署最新版本且全程串行。
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    # workflow_run 触发时只在上游成功时运行；手动触发时无条件运行
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # workflow_run 触发时需要用上游的 SHA，否则默认检出 HEAD（可能不是刚验证的那次提交）
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Build frontend
        run: bun install --frozen-lockfile && bun run build

      - name: Build backend
        run: cd server && bun install --frozen-lockfile && bun run build

      - name: Generate shared release metadata
        run: REQUIRE_RELEASE_SHA=1 bun scripts/generate-release-metadata.mjs

      # state-db Phase 0 sandbox smoke 已在临时 worktree 验证 better-sqlite3 工作。
      # 这里在 CI 跑一次确保（a）原生模块 build 成功 ESM import 成功；
      # （b）后续 PR 升级 Node/better-sqlite3 时若 ABI 不兼容会被立即抓出，
      # 而不是等到 VPS 部署后才 panic（exit 127 类错误代价更大）。
      - name: State DB smoke (better-sqlite3 ABI sanity)
        run: cd server && node ../scripts/state-db-smoke.mjs

      - name: Deploy readiness check
        run: bun scripts/check-deploy-readiness.mjs

      - name: Create deploy bundle
        run: |
          # 加入 server/package-lock.json：wrapper install 改用 npm ci --omit=dev，
          # 必须有 lockfile 才能保证 VPS 安装的依赖版本与 CI 构建一致。
          # 加入 deploy/vps-wrapper/deploy-chexian-api.sh：供 wrapper self-update
          # 子命令自我替换，避免每次 wrapper 改动都要手工 root sync（B294）。
          tar -czf deploy-bundle.tar.gz \
            dist/ \
            server/dist/ \
            server/package.json \
            server/package-lock.json \
            server/ecosystem.config.cjs \
            deploy/vps-wrapper/deploy-chexian-api.sh

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed, retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          VPS_IP="${{ vars.VPS_IP || '162.14.113.44' }}"
          retry 5 5 ssh-keyscan -T 10 -t ed25519,rsa,ecdsa "$VPS_IP" >> ~/.ssh/known_hosts 2>/dev/null

          VPS="deployer@${VPS_IP}"
          SSH_OPTS=(
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=20
            -o ConnectionAttempts=3
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=3
            -i ~/.ssh/deploy_key
          )
          SSH_CMD=(ssh "${SSH_OPTS[@]}")
          SCP_CMD=(scp "${SSH_OPTS[@]}")
          BUNDLE_NAME="deploy-bundle-${GITHUB_RUN_ID:-manual}-${GITHUB_RUN_ATTEMPT:-1}.tar.gz"

          retry 6 10 "${SSH_CMD[@]}" "$VPS" "echo 'SSH preflight OK'"
          retry 6 10 "${SCP_CMD[@]}" deploy-bundle.tar.gz "$VPS:/tmp/${BUNDLE_NAME}"

          "${SSH_CMD[@]}" "$VPS" "bash -s -- '$BUNDLE_NAME' '$RELEASE_SHA'" << 'DEPLOY'
            set -e
            BUNDLE_NAME="$1"
            EXPECTED_RELEASE_SHA="$2"
            STAGING_DIR="$(mktemp -d /tmp/chexian-deploy.XXXXXX)"

            cd /var/www/chexian

            # ── backup 前所有权预修复（防死锁，B-deploy-backup-owner）──
            # 背景：手动 root 操作（bcrypt 应急时绕过 wrapper 直接 sudo npm ci 等）会在
            # node_modules 留下 root-owned 子树，使下面 deployer 身份的 backup
            # `cp -r server/node_modules .bak` 全量 Permission denied → set -e 中断 →
            # 永远走不到 install 末尾的 chown trap → 死锁，每次自动部署都失败。
            # 修法：backup 前先 self-update 把 wrapper 升到含 fix-deps-owner 的版本，
            # 再 fix-deps-owner 把所有权归一到 deployer。旧 wrapper 不识别新子命令时 || true
            # 降级（首次引入需配合一次手动 chown 打破初始死锁，之后永久自愈）。
            sudo /usr/local/bin/deploy-chexian-api self-update || echo "[self-update@pre-backup] non-fatal"
            sudo /usr/local/bin/deploy-chexian-api fix-deps-owner || echo "[fix-deps-owner] non-fatal (旧 wrapper 未识别)"
            # frontend 属主归一（2026-07-10 全站 403 事故源头治理）：报告流水线/手工 root
            # 操作曾在 dist/reports 留下 root-owned 文件，deployer 的 rm -rf 删不净是
            # 套娃链的第一环。backup 前以 root 统一归还 deployer。
            sudo /usr/local/bin/deploy-chexian-api fix-frontend-owner || echo "[fix-frontend-owner] non-fatal (旧 wrapper 未识别)"

            # ── 残留预清（2026-07-10 全站 403 事故根治，防套娃第二通道）──
            # 上次 run 被硬杀（SSH 断连/Runner 回收）时 trap 不执行，*.bak / dist.new
            # 可能残留；cp/mv 撞上已存在的目标目录会退化成"移入内部"→ 备份层层嵌套。
            # 清场原则：rm 删不净（root-owned 残留）就 rename 让路——rename 只需父目录
            # 写权限，不受子树属主影响，绝不留下"目标目录仍存在"的状态。
            for STALE in frontend/dist.new frontend/dist.bak server/dist.bak server/node_modules.bak; do
              if [ -e "$STALE" ]; then
                rm -rf "$STALE" || true
                if [ -e "$STALE" ]; then
                  mv "$STALE" "${STALE}.stale.$(date +%Y%m%d%H%M%S)"
                  echo "[preclean] $STALE 删不净（属主残留？），已改名让路"
                fi
              fi
            done

            # ── 备份阶段：原生模块 + 锁文件回滚需要完整快照 ──
            # 仅 dist 回滚不够：npm ci --omit=dev 会重建 node_modules，
            # 若新版本的 better-sqlite3 等原生依赖编译失败或运行时异常，
            # 必须能还原到部署前的 node_modules + lockfile + package.json 状态。
            # 前端 dist 不再 cp 备份：下方换轨段用 rename 把整个旧 dist 原子改名为
            # dist.bak（零拷贝、天然保 mtime、不受 root-owned 残留影响），备份与切换合一。
            [ -d server/dist ] && cp -r server/dist server/dist.bak
            [ -f server/package.json ] && cp server/package.json server/package.json.bak
            [ -f server/package-lock.json ] && cp server/package-lock.json server/package-lock.json.bak
            [ -f server/ecosystem.config.cjs ] && cp server/ecosystem.config.cjs server/ecosystem.config.cjs.bak
            [ -d server/node_modules ] && cp -r server/node_modules server/node_modules.bak

            # ── 注册回滚 trap：覆盖 install/reload 失败 + 健康检查失败两条路径 ──
            # 背景（codex review P1, PR #379）：
            #   set -e 让 install / reload 一旦失败立即退出，根本不会进入 HEALTHY=false 分支。
            #   而 npm ci 清空旧 node_modules 后失败 = 半升级状态，正是本次改造要避免的。
            # 策略：用 ROLLBACK_NEEDED 标志 + trap EXIT，任何非正常退出（含 set -e 中断和
            #       显式 exit 1）都走完整回滚；HEALTHY=true 时清掉标志，trap 不动作。
            ROLLBACK_NEEDED=true
            # 守卫式还原（2026-07-10 全站 403 事故根治）：rm -rf 因 root-owned 残留
            # 删不净时，绝不把 .bak mv 进仍存在的目录——mv 撞现存目录=移入内部，正是
            # dist/dist.bak 套娃、index.html 从 nginx root 消失的根因。删不净就把残骸
            # rename 让路（rename 只需父目录写权限），确认目标真不存在后才还原。
            restore_from_bak() {
              local primary="$1" bak="$2"
              [ -d "$bak" ] || return 0
              rm -rf "$primary"
              if [ -e "$primary" ]; then
                mv "$primary" "${primary}.broken.$(date +%Y%m%d%H%M%S)" \
                  || { echo "Rollback: $primary 让路失败，保留 $bak 待人工介入（防套娃，跳过还原）"; return 0; }
              fi
              mv "$bak" "$primary"
            }
            rollback_deploy() {
              local exit_code=$?
              set +e   # 回滚内部禁止单步失败中断，确保 5 个对象都尝试还原
              if [ "$ROLLBACK_NEEDED" = true ]; then
                echo "Deploy failed (exit_code=$exit_code), rolling back..."
                # 前端换轨残骸：dist.new 尚未就位即失败时清掉，避免下次撞目标
                rm -rf /var/www/chexian/frontend/dist.new
                # 前端 dist（rename 换轨的逆操作）
                restore_from_bak /var/www/chexian/frontend/dist /var/www/chexian/frontend/dist.bak
                # 后端 dist
                restore_from_bak /var/www/chexian/server/dist /var/www/chexian/server/dist.bak
                # 包描述文件（仅在备份存在时还原）
                [ -f /var/www/chexian/server/package.json.bak ] && mv -f /var/www/chexian/server/package.json.bak /var/www/chexian/server/package.json
                [ -f /var/www/chexian/server/package-lock.json.bak ] && mv -f /var/www/chexian/server/package-lock.json.bak /var/www/chexian/server/package-lock.json
                [ -f /var/www/chexian/server/ecosystem.config.cjs.bak ] && mv -f /var/www/chexian/server/ecosystem.config.cjs.bak /var/www/chexian/server/ecosystem.config.cjs
                # node_modules（原生模块半升级状态的关键还原点）
                restore_from_bak /var/www/chexian/server/node_modules /var/www/chexian/server/node_modules.bak
                # 用 reload 而非 restart：确保 PM2 重读还原后的 ecosystem.config.cjs
                sudo /usr/local/bin/deploy-chexian-api reload || echo "Rollback reload failed, manual intervention required"
              fi
              # 保留原始退出码：set -e 中断时是失败命令的退出码；HEALTHY=false 显式 exit 1 时是 1
              exit $exit_code
            }
            trap rollback_deploy EXIT

            tar -xzf "/tmp/${BUNDLE_NAME}" -C "${STAGING_DIR}"

            # ── 前端换轨：rename-based 原子切换（2026-07-10 全站 403 事故根治）──
            # 旧实现 `rm -rf dist && mv staging dist`：dist/reports 内 root-owned 文件
            # （报告流水线曾以 root 落盘）让 deployer 的 rm 删不净 → set -e 进回滚 →
            # 回滚里 rm 再次删不净后 `mv dist.bak dist` 撞上仍存在的 dist → 退化成
            # "移入内部" → 产生 dist/dist.bak 套娃，index.html 从 nginx root 消失 →
            # 全站 403，且每重试一次多套一层（run 29066674713 实录）。
            # 新实现全程 rename：mv 只需父目录（deployer 所有）写权限，root-owned
            # 残留不再能阻塞部署；新产物先在 dist.new 组装完整，就位前活 dist 不动。
            mv "${STAGING_DIR}/dist" /var/www/chexian/frontend/dist.new

            # 保留诊断报告 HTML/manifest 跨 dist 替换存活（B-homepage-report）：
            # /reports/* 由 daily 流程（sync-vps）单独 rsync 到 dist/reports/，是 gitignore 的、
            # 不在构建产物里（产物 reports/ 仅含 .gitkeep）。不嫁接则每次部署都把首页报告
            # 冲成空白 SPA。换轨前从"活 dist"拷进 dist.new（cp -a 保 mtime；deployer 拷贝
            # root-owned 文件的副本归 deployer，顺带自愈属主漂移）。失败不阻断（|| true）。
            if [ -d /var/www/chexian/frontend/dist/reports ]; then
              mkdir -p /var/www/chexian/frontend/dist.new/reports
              cp -a /var/www/chexian/frontend/dist/reports/. /var/www/chexian/frontend/dist.new/reports/ || true
            fi

            # ── 旧 hashed 资产保留期（BACKLOG 2026-07-03-claude-0f86cb 白屏链残留环节）──
            # 长开 tab 的 SPA 在发布后懒加载旧 chunk：换 dist 让旧 chunk 物理消失
            # → 动态 import 404 白屏。index.html no-cache（PR #865）只救刷新后的新会话，
            # 救不了发布瞬间已加载的旧 index。修法：活 dist 的旧 assets 并入 dist.new
            # （-n 不覆盖新文件，Vite 产物 content-hash 命名同名即同内容），7 天后按 mtime
            # 出保留窗清理。注意 coreutils ≥9.2 的 cp -n 在跳过时以非零退出，|| true 必须保留。
            if [ -d /var/www/chexian/frontend/dist/assets ]; then
              mkdir -p /var/www/chexian/frontend/dist.new/assets
              cp -an /var/www/chexian/frontend/dist/assets/. /var/www/chexian/frontend/dist.new/assets/ || true
              find /var/www/chexian/frontend/dist.new/assets -type f -mtime +7 -delete || true
            fi

            # 换轨：老 dist 整体 rename 为 dist.bak（备份=改名，零拷贝），新 dist 就位。
            # dist.bak 已在预清阶段确保不存在；两次 rename 间隔微秒级，中途被杀也能由
            # trap 从 dist.bak 守卫式还原。
            if [ -d /var/www/chexian/frontend/dist ]; then
              mv /var/www/chexian/frontend/dist /var/www/chexian/frontend/dist.bak
            fi
            mv /var/www/chexian/frontend/dist.new /var/www/chexian/frontend/dist

            rm -rf /var/www/chexian/server/dist
            mv "${STAGING_DIR}/server/dist" /var/www/chexian/server/dist
            cp "${STAGING_DIR}/server/package.json" /var/www/chexian/server/package.json
            cp "${STAGING_DIR}/server/package-lock.json" /var/www/chexian/server/package-lock.json
            cp "${STAGING_DIR}/server/ecosystem.config.cjs" /var/www/chexian/server/ecosystem.config.cjs

            # 投放 wrapper 源到固定路径，供 self-update 子命令读取（B294）
            mkdir -p /var/www/chexian/server/.wrapper-source
            cp "${STAGING_DIR}/deploy/vps-wrapper/deploy-chexian-api.sh" /var/www/chexian/server/.wrapper-source/deploy-chexian-api.sh

            # 以下任一失败都会触发 trap → 走完整回滚
            # self-update：cmp 检测无变化则 skip；旧 wrapper 不识别此子命令时 exit 1
            # → 用 || true 优雅降级（旧 wrapper 不动，下次 wrapper 改动 PR 也不阻塞）
            # 即使源损坏未被替换，旧 wrapper 仍正常工作（无半升级风险）
            sudo /usr/local/bin/deploy-chexian-api self-update || echo "[self-update] non-fatal (old wrapper or source rejected)"
            sudo /usr/local/bin/deploy-chexian-api install
            sudo /usr/local/bin/deploy-chexian-api reload

            HEALTHY=false
            for i in $(seq 1 18); do
              sleep 10
              HEALTH_JSON="$(curl -fsS "http://localhost:3000/health?_=${EXPECTED_RELEASE_SHA}" || true)"
              if printf '%s' "$HEALTH_JSON" | grep -q '"success":true' \
                && printf '%s' "$HEALTH_JSON" | grep -q "\"releaseSha\":\"${EXPECTED_RELEASE_SHA}\""; then
                HEALTHY=true
                break
              fi
              echo "Health check attempt $i failed, retrying..."
            done

            if [ "$HEALTHY" = true ]; then
              echo "Deploy success!"
              ROLLBACK_NEEDED=false   # 关掉回滚标志，trap 仍会触发但不动作
              # || true：备份内若有 root-owned 残留删不净，不能把健康部署标成失败；
              # 残骸由下次 run 的 preclean（rm 或 rename 让路）+ fix-frontend-owner 收口
              rm -rf /var/www/chexian/frontend/dist.bak || true
              rm -rf /var/www/chexian/server/dist.bak || true
              rm -f /var/www/chexian/server/package.json.bak
              rm -f /var/www/chexian/server/package-lock.json.bak
              rm -f /var/www/chexian/server/ecosystem.config.cjs.bak
              rm -rf /var/www/chexian/server/node_modules.bak || true
            else
              echo "Health check failed!"
              exit 1   # 显式失败 → trap 触发 rollback_deploy
            fi

            rm -f "/tmp/${BUNDLE_NAME}"
            rm -rf "${STAGING_DIR}"
          DEPLOY

      # 公网/CDN 验证必须在 runner 侧、远端 rollback trap 之外执行：公网抖动可以让
      # workflow 失败并告警，但不能回滚已经通过 localhost 健康检查的生产服务。
      - name: Verify public release fingerprint and entry asset
        run: |
          set -euo pipefail
          PUBLIC_BASE="https://chexian.cretvalu.com"
          CACHE_BUSTER="${RELEASE_SHA}-${GITHUB_RUN_ID:-manual}-${GITHUB_RUN_ATTEMPT:-1}"
          PUBLIC_HEALTH="$(curl -fsS --retry 3 "${PUBLIC_BASE}/health?_=${CACHE_BUSTER}")"
          PUBLIC_RELEASE="$(curl -fsS --retry 3 "${PUBLIC_BASE}/release.json?_=${CACHE_BUSTER}")"
          INDEX_HTML="$(curl -fsS --retry 3 "${PUBLIC_BASE}/index.html?_=${CACHE_BUSTER}")"

          node -e '
            const expected = process.argv[1];
            for (const [name, raw] of [["health", process.argv[2]], ["release.json", process.argv[3]]]) {
              const parsed = JSON.parse(raw);
              if (parsed.releaseSha !== expected) {
                throw new Error(`${name} releaseSha mismatch: expected ${expected}, got ${parsed.releaseSha}`);
              }
            }
          ' "$RELEASE_SHA" "$PUBLIC_HEALTH" "$PUBLIC_RELEASE"

          ENTRY_PATH="$(node -e '
            const match = process.argv[1].match(/src="(\/assets\/[^"]+\.js)"/);
            if (match) process.stdout.write(match[1]);
          ' "$INDEX_HTML")"
          if [ -z "$ENTRY_PATH" ]; then
            echo "No module entry asset found in public index.html"
            exit 1
          fi
          curl -fsS --retry 3 -o /dev/null "${PUBLIC_BASE}${ENTRY_PATH}?_=${CACHE_BUSTER}"
          echo "Public release verification passed: ${RELEASE_SHA} ${ENTRY_PATH}"
