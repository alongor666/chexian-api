name: Deploy to VPS

on:
  # 仅在 Production Gate 通过后才部署，避免带病上线
  workflow_run:
    workflows: ["Production Gate"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # workflow_run 触发时只在上游成功时运行；手动触发时无条件运行
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # workflow_run 触发时需要用上游的 SHA，否则默认检出 HEAD（可能不是刚验证的那次提交）
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Build frontend
        run: bun install --frozen-lockfile && bun run build

      - name: Build backend
        run: cd server && bun install --frozen-lockfile && bun run build

      - name: Deploy readiness check
        run: bun scripts/check-deploy-readiness.mjs

      - name: Create deploy bundle
        run: |
          # 加入 server/package-lock.json：wrapper install 改用 npm ci --omit=dev，
          # 必须有 lockfile 才能保证 VPS 安装的依赖版本与 CI 构建一致。
          tar -czf deploy-bundle.tar.gz \
            dist/ \
            server/dist/ \
            server/package.json \
            server/package-lock.json \
            server/ecosystem.config.cjs

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed, retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          VPS_IP="${{ vars.VPS_IP || '162.14.113.44' }}"
          retry 5 5 ssh-keyscan -T 10 -t ed25519,rsa,ecdsa "$VPS_IP" >> ~/.ssh/known_hosts 2>/dev/null

          VPS="deployer@${VPS_IP}"
          SSH_OPTS=(
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=20
            -o ConnectionAttempts=3
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=3
            -i ~/.ssh/deploy_key
          )
          SSH_CMD=(ssh "${SSH_OPTS[@]}")
          SCP_CMD=(scp "${SSH_OPTS[@]}")
          BUNDLE_NAME="deploy-bundle-${GITHUB_RUN_ID:-manual}-${GITHUB_RUN_ATTEMPT:-1}.tar.gz"

          retry 6 10 "${SSH_CMD[@]}" "$VPS" "echo 'SSH preflight OK'"
          retry 6 10 "${SCP_CMD[@]}" deploy-bundle.tar.gz "$VPS:/tmp/${BUNDLE_NAME}"

          "${SSH_CMD[@]}" "$VPS" "bash -s -- '$BUNDLE_NAME'" << 'DEPLOY'
            set -e
            BUNDLE_NAME="$1"
            STAGING_DIR="$(mktemp -d /tmp/chexian-deploy.XXXXXX)"

            cd /var/www/chexian

            # ── 备份阶段：原生模块 + 锁文件回滚需要完整快照 ──
            # 仅 dist 回滚不够：npm ci --omit=dev 会重建 node_modules，
            # 若新版本的 better-sqlite3 等原生依赖编译失败或运行时异常，
            # 必须能还原到部署前的 node_modules + lockfile + package.json 状态。
            [ -d frontend/dist ] && cp -r frontend/dist frontend/dist.bak
            [ -d server/dist ] && cp -r server/dist server/dist.bak
            [ -f server/package.json ] && cp server/package.json server/package.json.bak
            [ -f server/package-lock.json ] && cp server/package-lock.json server/package-lock.json.bak
            [ -f server/ecosystem.config.cjs ] && cp server/ecosystem.config.cjs server/ecosystem.config.cjs.bak
            [ -d server/node_modules ] && cp -r server/node_modules server/node_modules.bak

            tar -xzf "/tmp/${BUNDLE_NAME}" -C "${STAGING_DIR}"

            rm -rf /var/www/chexian/frontend/dist
            mv "${STAGING_DIR}/dist" /var/www/chexian/frontend/dist

            rm -rf /var/www/chexian/server/dist
            mv "${STAGING_DIR}/server/dist" /var/www/chexian/server/dist
            cp "${STAGING_DIR}/server/package.json" /var/www/chexian/server/package.json
            cp "${STAGING_DIR}/server/package-lock.json" /var/www/chexian/server/package-lock.json
            cp "${STAGING_DIR}/server/ecosystem.config.cjs" /var/www/chexian/server/ecosystem.config.cjs

            sudo /usr/local/bin/deploy-chexian-api install
            sudo /usr/local/bin/deploy-chexian-api reload

            HEALTHY=false
            for i in $(seq 1 18); do
              sleep 10
              if curl -s http://localhost:3000/health | grep -q '"success":true'; then
                HEALTHY=true
                break
              fi
              echo "Health check attempt $i failed, retrying..."
            done

            if [ "$HEALTHY" = true ]; then
              echo "Deploy success!"
              rm -rf /var/www/chexian/frontend/dist.bak
              rm -rf /var/www/chexian/server/dist.bak
              rm -f /var/www/chexian/server/package.json.bak
              rm -f /var/www/chexian/server/package-lock.json.bak
              rm -f /var/www/chexian/server/ecosystem.config.cjs.bak
              rm -rf /var/www/chexian/server/node_modules.bak
            else
              echo "Health check failed! Rolling back..."
              # 前端 dist
              rm -rf /var/www/chexian/frontend/dist
              mv /var/www/chexian/frontend/dist.bak /var/www/chexian/frontend/dist
              # 后端 dist
              rm -rf /var/www/chexian/server/dist
              mv /var/www/chexian/server/dist.bak /var/www/chexian/server/dist
              # 包描述文件（仅在备份存在时还原）
              [ -f /var/www/chexian/server/package.json.bak ] && mv -f /var/www/chexian/server/package.json.bak /var/www/chexian/server/package.json
              [ -f /var/www/chexian/server/package-lock.json.bak ] && mv -f /var/www/chexian/server/package-lock.json.bak /var/www/chexian/server/package-lock.json
              [ -f /var/www/chexian/server/ecosystem.config.cjs.bak ] && mv -f /var/www/chexian/server/ecosystem.config.cjs.bak /var/www/chexian/server/ecosystem.config.cjs
              # node_modules（原生模块半升级状态的关键还原点）
              if [ -d /var/www/chexian/server/node_modules.bak ]; then
                rm -rf /var/www/chexian/server/node_modules
                mv /var/www/chexian/server/node_modules.bak /var/www/chexian/server/node_modules
              fi
              # 用 reload 而非 restart：确保 PM2 重读还原后的 ecosystem.config.cjs
              sudo /usr/local/bin/deploy-chexian-api reload
              exit 1
            fi

            rm -f "/tmp/${BUNDLE_NAME}"
            rm -rf "${STAGING_DIR}"
          DEPLOY
