name: Production Gate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  # 合并队列（merge queue）：PR 进队后 GitHub 在临时分支 gh-readonly-queue/main/*
  # 上触发 merge_group，必需检查须在此事件产出同名 status，否则队列永远等不到检查 → 合并门卡死。
  # 注：merge_group 跑在队列分支（非 main），deploy.yml 的 workflow_run branches:[main] 会过滤掉，
  # 不会触发部署；合并落 main 的 push 仍触发本 workflow → deploy，链路不变。
  merge_group:
  workflow_dispatch:

jobs:
  # docs/harness 快车道（精准分流，2026-06-25）：仅 pull_request 事件、且改动文件**全部**命中
  # harness/docs 白名单时 skip=true → 下游重活全部跳过，但 production-gate job 仍以 success 报出
  # 同名必需检查（"Production Readiness Gate"），避免 paths-ignore 让必需检查永远 pending 卡死。
  # 白名单：.claude/** · 开发文档/** · 共享知识库_* · *.md · BACKLOG_LOG.jsonl。
  # 任何一个文件在白名单外（src/** · server/** · scripts/**（含被单测覆盖的 scripts/loop/**）·
  # 数据管理/** · package.json · *.config.* · .github/** 等）→ 从严跑全套。
  # push: main / merge_group 一律跑全套（避开 base-ref 计算边界）。错误一律落"跑全套"，绝不误跳。
  # Governance Consistency Check（governance-check.yml）不加快车道——它耦合 .claude/** 内容
  # （CLAUDE.md 章节 / evidence-loop SSOT 漂移），harness 改动恰需它验，且更便宜。
  changes:
    name: Detect docs/harness-only
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # 仅对 PR 事件分流；push: main / merge_group 一律跑全套
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "事件 $EVENT_NAME（非 PR）→ 跑全套"
            exit 0
          fi
          # PR 真实改动（base...head 三点 = 自合并基以来 PR 自身改动）
          CHANGED=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
          echo "── PR 改动文件 ──"; printf '%s\n' "$CHANGED"
          if [ -z "$CHANGED" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ 无法解析改动文件 → 从严跑全套"
            exit 0
          fi
          # 取"白名单外"文件：非空即含生产/被测路径 → 跑全套。grep 失配返回非零，|| true 兜底。
          NON_DOC=$(printf '%s\n' "$CHANGED" | grep -vE '^(\.claude/|开发文档/|共享知识库_|BACKLOG_LOG\.jsonl$|.*\.md$)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "✅ 纯 harness/docs 改动 → 跳过 Production Gate 重活（Governance Check 仍跑）"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "── 白名单外文件（→ 跑全套）──"; printf '%s\n' "$NON_DOC"
          fi

  production-gate:
    name: Production Readiness Gate
    needs: changes
    runs-on: ubuntu-latest
    env:
      CI: "1"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"

    steps:
      # 重活步均守护 skip：纯 harness/docs 时全部跳过，job 仍以 success 报出必需检查（绿）。
      - name: Checkout repository
        if: needs.changes.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Bun
        if: needs.changes.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        if: needs.changes.outputs.skip != 'true'
        run: bun install --frozen-lockfile && cd server && bun install --frozen-lockfile

      - name: Typecheck
        if: needs.changes.outputs.skip != 'true'
        run: bun run typecheck

      - name: Frontend Build
        if: needs.changes.outputs.skip != 'true'
        run: bun run build

      # DuckDB CLI + Python duckdb：让 sx-promote.test.mjs（duckdb CLI 守卫）与
      # parquet-overlap-check.test.mjs（python duckdb 守卫）的集成/E2E 用例在 CI 真跑而非恒 skip
      # （backlog 2026-07-05-claude-d84df6）。CLI 版本从 server/package.json 的 @duckdb/node-api
      # （如 1.4.4-r.1 → v1.4.4）派生，与 Neo 保持 minor 兼容（CLAUDE.md §5）；python duckdb 同 minor。
      - name: Install DuckDB (CLI + Python)
        if: needs.changes.outputs.skip != 'true'
        run: |
          set -euo pipefail
          DUCKDB_VERSION=$(jq -r '.dependencies["@duckdb/node-api"]' server/package.json | cut -d- -f1)
          DUCKDB_MINOR=$(echo "$DUCKDB_VERSION" | cut -d. -f1-2)
          echo "目标 DuckDB 版本: v${DUCKDB_VERSION}（派生自 @duckdb/node-api，minor 线 ${DUCKDB_MINOR}.x）"
          curl -fsSL --retry 3 -o /tmp/duckdb_cli.zip \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          mkdir -p "$HOME/.duckdb/bin"
          unzip -o /tmp/duckdb_cli.zip -d "$HOME/.duckdb/bin"
          echo "$HOME/.duckdb/bin" >> "$GITHUB_PATH"
          "$HOME/.duckdb/bin/duckdb" --version
          # pandas 锁 2.x：duckdb 1.4 LTS 对 pandas 3 的兼容未验证；测试仅用 DataFrame 写 parquet fixture
          python3 -m pip install --quiet "duckdb==${DUCKDB_MINOR}.*" "pandas<3"
          python3 -c "import duckdb, pandas; print('python duckdb', duckdb.__version__, '/ pandas', pandas.__version__)"

      - name: Unit Tests
        if: needs.changes.outputs.skip != 'true'
        run: bun run test --run

      - name: Backend Typecheck
        if: needs.changes.outputs.skip != 'true'
        run: cd server && bun run build

      - name: Governance Check
        if: needs.changes.outputs.skip != 'true'
        run: bun run governance

      - name: Skipped (docs/harness-only)
        if: needs.changes.outputs.skip == 'true'
        run: echo "纯 harness/docs PR：Production Gate 重活跳过；harness 内容一致性由 Governance Consistency Check 验证。"

  e2e:
    name: E2E Tests (Playwright + CI fixture)
    needs: changes
    if: needs.changes.outputs.skip != 'true'   # 非必需检查 → docs/harness-only 时整 job 跳过，省 Playwright 安装
    runs-on: ubuntu-latest
    env:
      CI: "1"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile && cd server && bun install --frozen-lockfile

      # 全合成确定性数据 fixture（BACKLOG 2026-06-11-claude-89a352）：
      # 让 skipWhenNoData 在 CI 不再合法跳过 — 无数据时 E2E 直接失败（fail-closed）
      - name: Generate E2E data fixture
        run: node scripts/e2e/generate-ci-fixture.mjs

      # admin = 主会话；leshan = 快照隔离用例（verify-org-permissions）的机构级用户
      - name: Generate ephemeral E2E credentials
        run: |
          E2E_PASS="e2e-ci-$(openssl rand -hex 12)"
          ORG_PASS="e2e-org-$(openssl rand -hex 12)"
          ADMIN_HASH=$(cd server && node -e "console.log(require('bcrypt').hashSync(process.argv[1], 10))" "$E2E_PASS")
          ORG_HASH=$(cd server && node -e "console.log(require('bcrypt').hashSync(process.argv[1], 10))" "$ORG_PASS")
          {
            echo "E2E_PASSWORD=$E2E_PASS"
            echo "E2E_ORG_PASSWORD=$ORG_PASS"
            echo "USER_PASSWORDS={\"admin\":\"$ADMIN_HASH\",\"leshan\":\"$ORG_HASH\"}"
            echo "JWT_SECRET=e2e-ci-$(openssl rand -hex 24)"
          } >> "$GITHUB_ENV"

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
