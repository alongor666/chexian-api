name: Production Gate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  production-gate:
    name: Production Readiness Gate
    runs-on: ubuntu-latest
    env:
      CI: "1"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Frontend Build
        run: bun run build

      - name: Unit Tests
        run: bun run test --run
        # Note: DuckDB 集成测试（duckdb-*.test.ts, parquet-processing.test.ts）
        # 已在 vite.config.ts exclude 中排除（需要原生二进制运行时）
        # 本地运行: bun run test:integration

      - name: Backend Typecheck
        run: cd server && bun install --frozen-lockfile && bun run build

      - name: Governance Check
        run: bun run governance
