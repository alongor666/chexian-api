name: Production Gate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  # 合并队列（merge queue）：PR 进队后 GitHub 在临时分支 gh-readonly-queue/main/*
  # 上触发 merge_group，必需检查须在此事件产出同名 status，否则队列永远等不到检查 → 合并门卡死。
  # 注：merge_group 跑在队列分支（非 main），deploy.yml 的 workflow_run branches:[main] 会过滤掉，
  # 不会触发部署；合并落 main 的 push 仍触发本 workflow → deploy，链路不变。
  merge_group:
  workflow_dispatch:

jobs:
  # docs/harness 快车道（精准分流，2026-06-25）：仅 pull_request 事件、且改动文件**全部**命中
  # harness/docs 白名单时 skip=true → 下游重活全部跳过，但 production-gate job 仍以 success 报出
  # 同名必需检查（"Production Readiness Gate"），避免 paths-ignore 让必需检查永远 pending 卡死。
  # 白名单：.claude/** · 开发文档/** · 共享知识库_* · *.md · BACKLOG_LOG.jsonl · backlog-events/**。
  # 任何一个文件在白名单外（src/** · server/** · scripts/**（含被单测覆盖的 scripts/loop/**）·
  # 数据管理/** · package.json · *.config.* · .github/** 等）→ 从严跑全套。
  # push: main / merge_group 一律跑全套（避开 base-ref 计算边界）。错误一律落"跑全套"，绝不误跳。
  # Governance Consistency Check（governance-check.yml）不加快车道——它耦合 .claude/** 内容
  # （CLAUDE.md 章节 / evidence-loop SSOT 漂移），harness 改动恰需它验，且更便宜。
  changes:
    name: Detect docs/harness-only
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # 仅对 PR 事件分流；push: main / merge_group 一律跑全套
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "事件 $EVENT_NAME（非 PR）→ 跑全套"
            exit 0
          fi
          # PR 真实改动（base...head 三点 = 自合并基以来 PR 自身改动）
          CHANGED=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
          echo "── PR 改动文件 ──"; printf '%s\n' "$CHANGED"
          if [ -z "$CHANGED" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ 无法解析改动文件 → 从严跑全套"
            exit 0
          fi
          # 取"白名单外"文件：非空即含生产/被测路径 → 跑全套。grep 失配返回非零，|| true 兜底。
          NON_DOC=$(printf '%s\n' "$CHANGED" | grep -vE '^(\.claude/|开发文档/|共享知识库_|BACKLOG_LOG\.jsonl$|backlog-events/|.*\.md$)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "✅ 纯 harness/docs 改动 → 跳过 Production Gate 重活（Governance Check 仍跑）"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "── 白名单外文件（→ 跑全套）──"; printf '%s\n' "$NON_DOC"
          fi

  production-gate:
    name: Production Readiness Gate
    needs: changes
    runs-on: ubuntu-latest
    env:
      CI: "1"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"

    steps:
      # 重活步均守护 skip：纯 harness/docs 时全部跳过，job 仍以 success 报出必需检查（绿）。
      - name: Checkout repository
        if: needs.changes.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Bun
        if: needs.changes.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        if: needs.changes.outputs.skip != 'true'
        run: bun install --frozen-lockfile && cd server && bun install --frozen-lockfile

      - name: Typecheck
        if: needs.changes.outputs.skip != 'true'
        run: bun run typecheck

      - name: Frontend Build
        if: needs.changes.outputs.skip != 'true'
        run: bun run build

      # DuckDB CLI + Python duckdb：让 sx-promote.test.mjs（duckdb CLI 守卫）与
      # parquet-overlap-check.test.mjs（python duckdb 守卫）的集成/E2E 用例在 CI 真跑而非恒 skip
      # （backlog 2026-07-05-claude-d84df6）。CLI 版本从 server/package.json 的 @duckdb/node-api
      # （如 1.4.4-r.1 → v1.4.4）派生，与 Neo 保持 minor 兼容（CLAUDE.md §5）；python duckdb 同 minor。
      - name: Install DuckDB (CLI + Python)
        if: needs.changes.outputs.skip != 'true'
        run: |
          set -euo pipefail
          DUCKDB_VERSION=$(jq -r '.dependencies["@duckdb/node-api"]' server/package.json | cut -d- -f1)
          DUCKDB_MINOR=$(echo "$DUCKDB_VERSION" | cut -d. -f1-2)
          echo "目标 DuckDB 版本: v${DUCKDB_VERSION}（派生自 @duckdb/node-api，minor 线 ${DUCKDB_MINOR}.x）"
          curl -fsSL --retry 3 -o /tmp/duckdb_cli.zip \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          mkdir -p "$HOME/.duckdb/bin"
          unzip -o /tmp/duckdb_cli.zip -d "$HOME/.duckdb/bin"
          echo "$HOME/.duckdb/bin" >> "$GITHUB_PATH"
          "$HOME/.duckdb/bin/duckdb" --version
          # 装完整 ETL 依赖（数据管理/requirements.txt：pandas/pyarrow/openpyxl/numpy/python-calamine）——
          # 集成测试 tests/parquet-processing.test.ts 的 beforeAll 调 数据管理/pipelines/transform.py 生成 parquet
          # （engine='calamine' 读 xlsx + pyarrow 写 parquet），缺任一即 ModuleNotFoundError → 整套 integration 红
          # （backlog 2026-07-03-claude-131dd8 首跑实证：仅装 pandas 时 parquet-processing 因缺 pyarrow 挂）。
          # 用 requirements SSOT（== requirements-test.txt 的 `-r` 源）而非手列，避免 dep 清单漂移——该文件注释
          # 记录过 2026-07-05 python-calamine 漏登记致 7 个 ETL 测试 CI ImportError 的同类事故。
          # duckdb 显式 ==${DUCKDB_MINOR}.* 与 requirements 的 >=1.4.0 在同一 pip 调用内求交 → 锁定 Neo 绑定 minor（CLAUDE.md §5）。
          # pandas 不设上界：与 requirements（pandas>=2.0.0，实际解析 3.x）同源；本步 pip 落 user-site，在 sys.path 中
          # 优先于后续 Setup Python 的 site-packages，若锁 pandas<3 会遮蔽 pytest 步骤 pandas 3
          # （2026-07-05 #928×#929 集成冲突实证，main 红过一轮）。
          python3 -m pip install --quiet -r 数据管理/requirements.txt "duckdb==${DUCKDB_MINOR}.*"
          python3 -c "import duckdb, pandas, pyarrow, python_calamine; print('duckdb', duckdb.__version__, '/ pandas', pandas.__version__, '/ pyarrow', pyarrow.__version__, '/ calamine OK')"

      - name: Unit Tests
        if: needs.changes.outputs.skip != 'true'
        run: bun run test --run

      # 集成测试（DuckDB 原生绑定 @duckdb/node-api，node 环境）— backlog 2026-07-03-claude-131dd8。
      # 此前 CI 从不执行这套用例，最活跃的分省 RLS 隔离口径（duckdb-branch-* / duckdb-repair-*-rls，
      # PR #997 团队维度 JOIN 消歧闸守护的对象）+ 7 个立方体影子对账（duckdb-cube-*）回归只能靠本地人肉。
      # 它们从 jsdom 单测 config 排除（jsdom 环境无法加载 .node 原生模块），改由 node 环境的
      # vitest.integration.config.ts 运行 —— 与上方 `bun run test --run`（jsdom）互不污染。
      # 全部用例自带合成数据（tmp parquet via COPY / 内存 VALUES），不依赖 gitignored warehouse parquet，
      # 故 CI 无数据也全绿、无静默 skip。所需依赖均已就绪：@duckdb/node-api 由上方 `cd server && bun install`
      # 构建，DuckDB CLI + python/pandas 由上方「Install DuckDB (CLI + Python)」步骤备好
      # （tests/duckdb-claims-dedup-gate 与 parquet-processing 的 skipIf 探针据此判定不 skip）。
      - name: Integration Tests (DuckDB native binding)
        if: needs.changes.outputs.skip != 'true'
        run: bun run test:integration

      - name: Backend Typecheck
        if: needs.changes.outputs.skip != 'true'
        run: cd server && bun run build

      - name: Governance Check
        if: needs.changes.outputs.skip != 'true'
        run: bun run governance

      # Python 测试（backlog 2026-07-05-claude-1c498b）：ETL 分省隔离 / 赔案分区 /
      # 企微同步幂等等高风险逻辑的回归保护。收集入口 = 根级 pytest.ini testpaths；
      # 依赖本地 warehouse parquet 的用例由各文件 skipif 守卫显式 skip（-rs 列出原因），
      # CI 上零 parquet → 纯逻辑用例全跑、数据用例全显式 skipped，无静默跳过。
      - name: Setup Python
        if: needs.changes.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-test.txt
            数据管理/requirements.txt

      - name: Install Python test dependencies
        if: needs.changes.outputs.skip != 'true'
        run: pip install -r requirements-test.txt

      - name: Python Tests (pytest)
        if: needs.changes.outputs.skip != 'true'
        run: python3 -m pytest

      - name: Skipped (docs/harness-only)
        if: needs.changes.outputs.skip == 'true'
        run: echo "纯 harness/docs PR：Production Gate 重活跳过；harness 内容一致性由 Governance Consistency Check 验证。"

  e2e:
    name: E2E Tests (Playwright + CI fixture)
    needs: changes
    if: needs.changes.outputs.skip != 'true'   # 非必需检查 → docs/harness-only 时整 job 跳过，省 Playwright 安装
    runs-on: ubuntu-latest
    env:
      CI: "1"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile && cd server && bun install --frozen-lockfile

      # 全合成确定性数据 fixture（BACKLOG 2026-06-11-claude-89a352）：
      # 让 skipWhenNoData 在 CI 不再合法跳过 — 无数据时 E2E 直接失败（fail-closed）
      - name: Generate E2E data fixture
        run: node scripts/e2e/generate-ci-fixture.mjs

      # admin = 主会话；leshan = 快照隔离用例（verify-org-permissions）的机构级用户
      - name: Generate ephemeral E2E credentials
        run: |
          E2E_PASS="e2e-ci-$(openssl rand -hex 12)"
          ORG_PASS="e2e-org-$(openssl rand -hex 12)"
          ADMIN_HASH=$(cd server && node -e "console.log(require('bcrypt').hashSync(process.argv[1], 10))" "$E2E_PASS")
          ORG_HASH=$(cd server && node -e "console.log(require('bcrypt').hashSync(process.argv[1], 10))" "$ORG_PASS")
          {
            echo "E2E_PASSWORD=$E2E_PASS"
            echo "E2E_ORG_PASSWORD=$ORG_PASS"
            echo "USER_PASSWORDS={\"admin\":\"$ADMIN_HASH\",\"leshan\":\"$ORG_HASH\"}"
            echo "JWT_SECRET=e2e-ci-$(openssl rand -hex 24)"
          } >> "$GITHUB_ENV"

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
