name: Claude Code

on:
  # PR 评论中 @claude 触发
  issue_comment:
    types: [created]

  # PR 新建或更新时触发
  pull_request:
    types: [opened, synchronize, reopened]

  # Issue 中 @claude 触发
  issues:
    types: [opened, edited]

  # 手动触发（支持 --teleport 从本地切换到云端）
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task prompt for Claude'
        required: false
        type: string
      session_id:
        description: 'Session ID for teleport continuation'
        required: false
        type: string

# 避免并发运行同一 PR 的任务
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude-code:
    name: Claude Code Agent
    runs-on: ubuntu-latest

    # 仅在以下情况运行：
    # 1. PR/Issue 评论包含 @claude
    # 2. workflow_dispatch 手动触发
    # 3. PR 新建时（可选，用于自动代码审查）
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'pull_request' && github.event.action == 'opened')

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1"

      - name: Install dependencies
        run: bun install

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # 从评论或手动输入获取提示
          prompt: ${{ github.event.inputs.prompt || '' }}

          # Session ID 支持 --teleport 继续会话
          session_id: ${{ github.event.inputs.session_id || '' }}

          # 允许的工具集（根据项目需求配置）
          allowed_tools: |
            Read
            Write
            Edit
            Glob
            Grep
            Bash(bun:*)
            Bash(git:*)
            Bash(npx:vitest*)
            WebFetch

          # 禁止的工具（安全考虑）
          disallowed_tools: |
            Bash(rm -rf /*)
            Bash(*sudo*)
            Bash(*curl*|*sh)

          # 自定义系统提示
          custom_instructions: |
            你正在 GitHub Actions 中运行，请遵循以下规则：

            1. 阅读 CLAUDE.md 了解项目规范
            2. 使用 Bun 而非 npm/yarn
            3. 提交前运行 `bun run governance` 校验
            4. 修改代码后运行 `bun test` 确保测试通过
            5. 遵循 §2.5 实现前检查协议，查找现有实现

            当收到 @claude 标记时：
            - 分析请求内容
            - 如果是代码修改，先检查测试是否通过
            - 完成后在 PR 中回复进度

          # 最大思考 tokens
          max_thinking_tokens: 10000

          # 超时设置（分钟）
          timeout_minutes: 30

      - name: Run tests after changes
        if: success()
        run: |
          bun test --reporter=verbose 2>&1 | head -100 || true

      - name: Run governance check
        if: success()
        run: |
          bun run governance || echo "::warning::Governance check has findings"

  # 自动 PR 审查（可选）
  auto-review:
    name: Auto Review PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1"

      - name: Install and Test
        run: |
          bun install
          bun test --reporter=verbose 2>&1 | head -50 || true
          bun run build 2>&1 | tail -20 || true

      - name: Check for @claude review request
        if: contains(github.event.pull_request.body, '@claude review')
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            请审查此 PR 的代码变更：
            1. 检查是否符合 CLAUDE.md 规范
            2. 检查是否有潜在的安全问题
            3. 检查是否有性能问题
            4. 提供改进建议

            使用中文回复，保持专业简洁。
          allowed_tools: |
            Read
            Glob
            Grep
          max_thinking_tokens: 5000
          timeout_minutes: 10
