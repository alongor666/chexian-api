name: Claude Code

on:
  # PR 评论中 @claude 触发
  issue_comment:
    types: [created]

  # Issue 中 @claude 触发
  issues:
    types: [opened, edited]

  # 手动触发
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task prompt for Claude'
        required: false
        type: string

# claude-code 写代码 job 的并发控制
concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude-code:
    name: Claude Code Agent
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: ${{ github.event.inputs.prompt || '' }}

          allowed_tools: |
            Read
            Write
            Edit
            Glob
            Grep
            Bash(bun:*)
            Bash(git:*)
            Bash(npx:vitest*)
            WebFetch

          disallowed_tools: |
            Bash(rm -rf /*)
            Bash(*sudo*)
            Bash(*curl*|*sh)

          custom_instructions: |
            你正在 GitHub Actions 中运行，请遵循以下规则：
            1. 阅读 CLAUDE.md 了解项目规范
            2. 使用 Bun 而非 npm/yarn
            3. 提交前运行 `bun run governance` 校验
            4. 修改代码后运行 `bun run test --run` 确保测试通过
            5. 遵循检查协议，查找现有实现再动手

          timeout_minutes: 30

      # DuckDB CLI + Python duckdb：让 sx-promote / parquet-overlap-check 的守卫用例真跑而非恒 skip
      # （backlog 2026-07-05-claude-d84df6）。版本派生逻辑与 production-gate.yml 同步维护。
      # 本 job 测试为顾问性质（continue-on-error），安装失败不阻断 agent 工作。
      - name: Install DuckDB (CLI + Python)
        if: success()
        continue-on-error: true
        run: |
          set -euo pipefail
          DUCKDB_VERSION=$(jq -r '.dependencies["@duckdb/node-api"]' server/package.json | cut -d- -f1)
          DUCKDB_MINOR=$(echo "$DUCKDB_VERSION" | cut -d. -f1-2)
          curl -fsSL --retry 3 -o /tmp/duckdb_cli.zip \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          mkdir -p "$HOME/.duckdb/bin"
          unzip -o /tmp/duckdb_cli.zip -d "$HOME/.duckdb/bin"
          echo "$HOME/.duckdb/bin" >> "$GITHUB_PATH"
          "$HOME/.duckdb/bin/duckdb" --version
          python3 -m pip install --quiet "duckdb==${DUCKDB_MINOR}.*" "pandas<3"

      - name: Run tests after changes
        if: success()
        continue-on-error: true
        run: bun run test --run 2>&1 | tail -20

      - name: Run governance check
        if: success()
        continue-on-error: true
        run: bun run governance
