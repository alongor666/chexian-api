name: Claude Code

on:
  # PR 评论中 @claude 触发
  issue_comment:
    types: [created]

  # Issue 中 @claude 触发
  issues:
    types: [opened, edited]

  # 手动触发（支持 --teleport 从本地切换到云端）
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task prompt for Claude'
        required: false
        type: string
      session_id:
        description: 'Session ID for teleport continuation'
        required: false
        type: string

# 避免并发运行同一 PR 的任务
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude-code:
    name: Claude Code Agent
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ github.event.inputs.prompt || '' }}
          session_id: ${{ github.event.inputs.session_id || '' }}

          allowed_tools: |
            Read
            Write
            Edit
            Glob
            Grep
            Bash(bun:*)
            Bash(git:*)
            Bash(npx:vitest*)
            WebFetch

          disallowed_tools: |
            Bash(rm -rf /*)
            Bash(*sudo*)
            Bash(*curl*|*sh)

          custom_instructions: |
            你正在 GitHub Actions 中运行，请遵循以下规则：
            1. 阅读 CLAUDE.md 了解项目规范
            2. 使用 Bun 而非 npm/yarn
            3. 提交前运行 `bun run governance` 校验
            4. 修改代码后运行 `bun run test --run` 确保测试通过
            5. 遵循检查协议，查找现有实现再动手

          max_thinking_tokens: 10000
          timeout_minutes: 30

      - name: Run tests after changes
        if: success()
        run: bun run test --run 2>&1 | tail -20 || true

      - name: Run governance check
        if: success()
        run: bun run governance || echo "::warning::Governance check has findings"

  # PR 中显式请求 @claude review 才触发审查
  auto-review:
    name: Auto Review PR
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude review')

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            请审查此 PR 的代码变更：
            1. 检查是否符合 CLAUDE.md 规范
            2. 检查是否有潜在的安全问题
            3. 检查是否有性能问题
            4. 提供改进建议

            使用中文回复，保持专业简洁。
          allowed_tools: |
            Read
            Glob
            Grep
          max_thinking_tokens: 5000
          timeout_minutes: 10
