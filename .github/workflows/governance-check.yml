name: Governance Check

on:
  pull_request:
    branches: [ main ]
  # 合并队列（merge queue）：必需检查须在 merge_group 事件产出同名 status，否则队列卡死。详见 production-gate.yml 注释。
  merge_group:
  workflow_dispatch:

jobs:
  governance-check:
    name: Governance Consistency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # RouteCatalog 参数契约检查（scripts/route-catalog/validate-params.ts）
      # 需 import server 源码（zod schema），故须安装 server 独立 package 依赖
      - name: Install server dependencies
        run: cd server && bun install --frozen-lockfile

      - name: Run governance check
        run: bun run governance
