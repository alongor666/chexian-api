name: Cube Grayscale Sentinel

# 通用立方体灰度阶段 1 的自动观测器。每小时跑一次，读 /health 的 cubes + cubeShadow
# 字段（PR #604 引入），按确定性规则判定灰度健康度，CRITICAL 异常自动追踪 issue。
#
# 设计：scripts/sentinel/cube-grayscale-sentinel.mjs
# 范式对齐：etl-anomaly-sentinel.yml（同一 issue 追踪范式，sentinel-out artifact）
# BACKLOG：uid=2026-06-11-claude-90a92c

on:
  schedule:
    # 每小时跑一次（UTC）观测哨兵。灰度阶段宁可勤报。
    - cron: '15 * * * *'
    # 每天 01:30 UTC 跑一次晋级判定（promote-check job）：cube-promote 读哨兵 7 天
    # 历史 + /health 自动判 canAdvance；达标在追踪 issue 通知人工起切流 PR。
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      api_base:
        description: 'API base（默认 https://chexian.cretvalu.com）'
        required: false
        default: 'https://chexian.cretvalu.com'

concurrency:
  group: cube-grayscale-sentinel
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  # 每小时观测哨兵（盯「有没有出问题」）。每日 01:30 cron 只跑下方 promote-check。
  sentinel:
    if: github.event.schedule != '30 1 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run cube grayscale sentinel
        id: run
        env:
          API_BASE: ${{ inputs.api_base || vars.SENTINEL_API_BASE || 'https://chexian.cretvalu.com' }}
        run: |
          node scripts/sentinel/cube-grayscale-sentinel.mjs \
            --api-base "$API_BASE" \
            --out-dir sentinel-out/cube-grayscale

      # CRITICAL 时主步骤 exit 1，但 summary 必须可在 job 日志直接读到
      # （artifact 在部分网络环境拿不到；日志走 GH API 永远可读）
      - name: Print summary to log
        if: always()
        run: |
          echo "===== cube-grayscale summary.md ====="
          cat sentinel-out/cube-grayscale/summary.md 2>/dev/null || echo "(no summary)"
          echo "===== verdict.json ====="
          cat sentinel-out/cube-grayscale/verdict.json 2>/dev/null || echo "(no verdict)"

      - name: Upload run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cube-grayscale-${{ github.run_id }}
          path: sentinel-out/cube-grayscale/
          if-no-files-found: ignore
          retention-days: 30

      - name: Post anomaly to tracking issue
        # always()：CRITICAL 时主步骤 exit 1 整个 job 标记 failure，
        # 默认 if 隐含 success() 会把本步骤跳过 —— 恰恰是最需要发 issue 的时刻。
        # 首跑实战即踩中（4 次 CRITICAL 零 issue），加 always() 修复。
        if: always() && steps.run.outputs.has_anomalies == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SUMMARY_PATH: ${{ steps.run.outputs.summary_path }}
          SEVERITY: ${{ steps.run.outputs.max_severity }}
        run: |
          set -euo pipefail
          TITLE="立方体灰度哨兵追踪"
          LABEL="cube-grayscale-anomaly"
          gh label create "$LABEL" --color D93F0B --description "立方体灰度哨兵告警" 2>/dev/null || true
          ISSUE=$(gh issue list --state open --search "in:title $TITLE" --json number,title \
            --jq ".[] | select(.title==\"$TITLE\") | .number" | head -n1)
          if [ -z "$ISSUE" ]; then
            ISSUE=$(gh issue create --title "$TITLE" --label "$LABEL" \
              --body "立方体灰度哨兵的集中追踪 issue。每次检测到异常会在此追加评论；CRITICAL 才退出码 1，WARN/INFO 仅记录。" \
              | grep -oE '[0-9]+$' | head -n1)
            echo "created tracking issue #$ISSUE"
          fi
          gh issue edit "$ISSUE" --add-label "$LABEL" 2>/dev/null || true
          # 评论开头带严重度，便于 issue 列表速览
          {
            echo "**严重度**：\`$SEVERITY\`"
            echo ""
            cat "$SUMMARY_PATH"
          } | gh issue comment "$ISSUE" --body-file -
          echo "posted anomaly (severity=$SEVERITY) to issue #$ISSUE"

      - name: Report sentinel self-failure
        # 兜底告警：哨兵「自身」崩溃（脚本异常/checkout/setup 失败 → job=failure 且
        # has_anomalies 未产出）时往追踪 issue 发评论。业务 CRITICAL（脚本 exit 1 + has_anomalies=true）
        # 已由上方 Post anomaly（always()）处理，故此处排除 has_anomalies=='true' 避免重复告警。
        if: failure() && steps.run.outputs.has_anomalies != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="立方体灰度哨兵追踪"
          LABEL="cube-grayscale-anomaly"
          gh label create "$LABEL" --color D93F0B --description "立方体灰度哨兵告警" 2>/dev/null || true
          ISSUE=$(gh issue list --state open --search "in:title $TITLE" --json number,title \
            --jq ".[] | select(.title==\"$TITLE\") | .number" | head -n1)
          if [ -z "$ISSUE" ]; then
            ISSUE=$(gh issue create --title "$TITLE" --label "$LABEL" \
              --body "立方体灰度哨兵的集中追踪 issue。每次检测到异常会在此追加评论；CRITICAL 才退出码 1，WARN/INFO 仅记录。" \
              | grep -oE '[0-9]+$' | head -n1)
          fi
          {
            echo "## ⚠️ 哨兵自身故障（非业务异常 · 观测中断）"
            echo ""
            echo "立方体灰度哨兵本次运行 **失败** 且未产出判定（脚本异常或环境/网络问题）。修复前，立方体灰度健康度观测中断。"
            echo ""
            echo "- 运行日志：$RUN_URL"
            echo "- 排查：点开 run 看 \`Run cube grayscale sentinel\` 步骤日志"
          } | gh issue comment "$ISSUE" --body-file -
          echo "posted self-failure alert to issue #$ISSUE"

  # ── 每日晋级判定：cube-promote 确定性判定器，canAdvance 时通知人工起切流 PR ──
  # 与哨兵互补：哨兵每小时盯「有没有出问题」，本 job 每天判「能不能推进」。
  # 起 PR + 合并都人工（部署链红线 pr-checklist §4 / deploy-chain-sop 禁 auto-merge）。
  promote-check:
    if: github.event.schedule == '30 1 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 定位灰度哨兵追踪 issue
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="立方体灰度哨兵追踪"
          NUM=$(gh issue list --state open --search "in:title $TITLE" --json number,title \
            --jq ".[] | select(.title==\"$TITLE\") | .number" | head -n1)
          echo "num=${NUM}" >> "$GITHUB_OUTPUT"
          echo "追踪 issue: ${NUM:-（尚无，promote 会判样本不足）}"

      - name: 跑 cube-promote 晋级判定
        id: promote
        env:
          GH_TOKEN: ${{ github.token }}
          API_BASE: ${{ inputs.api_base || vars.SENTINEL_API_BASE || 'https://chexian.cretvalu.com' }}
        run: |
          set +e
          ARGS=(--health-url "$API_BASE/health" --ecosystem-file server/ecosystem.config.cjs --gh-token "$GH_TOKEN")
          if [ -n "${{ steps.issue.outputs.num }}" ]; then
            ARGS+=(--history-issue "${{ steps.issue.outputs.num }}")
          fi
          node scripts/release/cube-promote.mjs "${ARGS[@]}" | tee promote-verdict.json
          CAN=$(node -e 'try{process.stdout.write(JSON.parse(require("fs").readFileSync("promote-verdict.json","utf8")).canAdvance?"true":"false")}catch{process.stdout.write("false")}')
          echo "can_advance=$CAN" >> "$GITHUB_OUTPUT"
          echo "判定 canAdvance=$CAN"

      - name: Print verdict to log
        if: always()
        run: cat promote-verdict.json 2>/dev/null || echo "(no verdict)"

      - name: canAdvance → 通知追踪 issue（已有 open 切流 PR 则跳过防刷屏）
        if: steps.promote.outputs.can_advance == 'true' && steps.issue.outputs.num != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          OPEN_PR=$(gh pr list --state open --search "CUBE_ROUTING_ENABLED in:body" --json number --jq 'length')
          if [ "${OPEN_PR:-0}" -gt 0 ]; then
            echo "已有 open 切流 PR（${OPEN_PR} 个），跳过通知"
            exit 0
          fi
          {
            echo "**✅ 立方体灰度晋级门槛达成（cube-promote canAdvance=true）**"
            echo ""
            echo "影子对账连续观测达标，首批切流（trend / growth / salesman-ranking）可起部署链 PR。"
            echo "建议 \`server/ecosystem.config.cjs\` 配置："
            echo ""
            echo '```js'
            echo "CUBE_ROUTING_ENABLED: 'true',"
            echo "CUBE_ROUTING_ROUTES: 'trend,growth,salesman-ranking',  // 排除搁置的 cost/kpi"
            echo "CUBE_SHADOW_SAMPLE_RATE: '0.01',  // 切流后采样影子安全网（bf2c4e）"
            echo '```'
            echo ""
            echo "⚠️ **部署链 PR 禁 auto-merge**，人工低峰窗口合并并盯前 5 分钟（pr-checklist §4 / deploy-chain-sop）。"
            echo ""
            echo "<details><summary>promote verdict</summary>"
            echo ""
            echo '```json'
            cat promote-verdict.json
            echo '```'
            echo ""
            echo "</details>"
          } | gh issue comment "${{ steps.issue.outputs.num }}" --body-file -
          echo "已通知 issue #${{ steps.issue.outputs.num }}"
