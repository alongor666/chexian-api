# 同步 cli/ 子目录到独立仓库 alongor666/cx-cli
#
# 触发：main 分支收到含 cli/** 改动的 push（即 PR 合并后），或手动 workflow_dispatch
# 凭据：CX_CLI_SYNC_TOKEN secret（fine-grained PAT，仅授权 cx-cli contents:write）
# 策略：保留 cx-cli 完整 commit history，每次同步追加 squashed "sync: ..." commit
#
# 设置一次（user 操作，不能由 AI 代做）：
#   1. https://github.com/settings/personal-access-tokens/new 生成 fine-grained PAT：
#      - Resource owner: alongor666
#      - Repository access: Only select repositories → alongor666/cx-cli
#      - Permissions: Repository → Contents (Read and write)
#      - Expiration: 1 year（或 user 自选；过期需重新生成）
#   2. https://github.com/alongor666/chexian-api/settings/secrets/actions/new
#      - Name: CX_CLI_SYNC_TOKEN
#      - Value: <粘贴 PAT 值>
#   3. 在 Actions 页手动 Run workflow 验证首次同步成功
#
# 来源：chexian-api PR #6XX（cli/ 同步到独立仓库 + 自动化机制）

name: Sync cli to cx-cli

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout chexian-api
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check secret presence (graceful skip)
        id: check_secret
        env:
          PAT: ${{ secrets.CX_CLI_SYNC_TOKEN }}
        run: |
          if [ -z "${PAT:-}" ]; then
            echo "::warning::CX_CLI_SYNC_TOKEN secret 未设置。同步跳过（不算 fail）。见 sync-cx-cli.yml 顶部注释 step 1-2 创建 PAT 并加 secret。"
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync cli/ → cx-cli
        if: steps.check_secret.outputs.has_secret == 'true'
        env:
          PAT: ${{ secrets.CX_CLI_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          TARGET_DIR="$(mktemp -d)"
          echo "Clone cx-cli into $TARGET_DIR"
          git clone --quiet "https://x-access-token:${PAT}@github.com/alongor666/cx-cli.git" "$TARGET_DIR"

          # rsync 规则:
          #   --delete: 让 target 与 source 完全一致（避免遗留过时文件）
          #   --exclude=images: 仅 source 端 .gitignore 兜底（防 user 本地截图含 PAT）
          # cli/bun.lock 是独立镜像发布所需的冻结依赖真源；旧 package-lock.json 会被删除。
          echo "Rsync cli/ → $TARGET_DIR (exclude .git/node_modules/dist/manual/images)"
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='manual/images' \
            cli/ "$TARGET_DIR/"

          # 记录 chexian-api 中最后一次改变 cli/ 的源码提交。镜像 tag 发布器把它写进
          # manifest.sourceCommit；promotion workflow 也据此确认 tag 指向精确同步版本。
          git log -1 --format=%H -- cli/ > "$TARGET_DIR/source-commit.txt"

          cd "$TARGET_DIR"
          # 仅在内容真的变化时 commit
          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "::notice::cx-cli 已与 chexian-api/cli/ 一致，无需同步"
            exit 0
          fi

          git add -A
          git commit \
            -m "sync: chexian-api cli/ → cx-cli" \
            -m "Source: alongor666/chexian-api@${{ github.sha }}" \
            -m "Triggered: ${{ github.event_name }} (run_id=${{ github.run_id }})" \
            -m "Auto-generated by .github/workflows/sync-cx-cli.yml. Do not edit cx-cli directly — submit PRs to alongor666/chexian-api cli/."

          git push origin main
          echo "::notice::已同步 chexian-api/cli/ → cx-cli main (run_id=${{ github.run_id }})"
