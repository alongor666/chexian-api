# ============================================================
# 车险业务分析系统 - Docker Compose 部署配置
# ============================================================
# 使用方法:
#   docker-compose up -d        # 启动
#   docker-compose down         # 停止
#   docker-compose logs -f      # 查看日志
# ============================================================

services:
  chexian:
    image: nginx:alpine
    container_name: chexian-dashboard
    ports:
      - "8080:80"
    volumes:
      # 前端静态文件（需要先构建）
      - ../dist:/usr/share/nginx/html:ro
      # 共享数据目录
      - ./data:/usr/share/nginx/html/data:ro
      # Nginx 配置
      - ./nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================================
# 使用说明：
# 1. 先构建前端：cd .. && bun run build
# 2. 创建数据目录：mkdir -p deploy/data
# 3. 复制数据文件：cp 业务数据.parquet deploy/data/业务数据.parquet
# 4. 启动容器：cd deploy && docker-compose up -d
# 5. 访问：http://localhost:8080
# ============================================================
