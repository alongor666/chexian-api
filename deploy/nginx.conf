# ============================================================
# 车险业务分析系统 - Nginx 内网部署配置
# ============================================================
# 使用方法：
# 1. 复制此文件到 /etc/nginx/sites-available/chexian
# 2. 修改 server_name 为实际内网IP或域名
# 3. 修改 root 为实际部署路径
# 4. 创建软链接: ln -s /etc/nginx/sites-available/chexian /etc/nginx/sites-enabled/
# 5. 重启 nginx: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;

    # ========== 修改此处为你的内网IP或域名 ==========
    server_name 192.168.1.100;
    # server_name chexian.company.local;  # 或使用内网域名

    # ========== 内网IP白名单（安全限制） ==========
    # 只允许公司内网访问
    allow 192.168.0.0/16;    # 192.168.x.x 网段
    allow 10.0.0.0/8;        # 10.x.x.x 网段
    allow 172.16.0.0/12;     # 172.16.x.x - 172.31.x.x 网段
    allow 127.0.0.1;         # 本机
    deny all;                # 拒绝其他所有IP

    # ========== 日志配置 ==========
    access_log /var/log/nginx/chexian_access.log;
    error_log /var/log/nginx/chexian_error.log;

    # ========== Gzip 压缩 ==========
    # 生产曾实测静态资源未压缩直传（594KB/317KB 原样下发），此段为必需基线。
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types application/json text/plain text/css application/javascript application/xml text/xml;
    # 直接吃构建期预压缩 .gz 产物（vite compression 插件），缺文件自动回落动态压缩
    gzip_static on;

    # ========== DuckDB-WASM 必需的 CORS 头 ==========
    # 这些头是 SharedArrayBuffer 正常工作的必要条件
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ========== 前端静态文件 ==========
    location / {
        # ========== 修改此处为实际部署路径 ==========
        root /var/www/chexian/frontend/dist;

        index index.html;
        try_files $uri $uri/ /index.html;

        # index.html 禁长缓存：chunk 靠 hash 换新，index.html 必须每次带 ETag 校验，
        # 否则部署后旧 index 引用已删除的旧 chunk → 404 白屏（同 nginx-fullstack.conf）。
        location = /index.html {
            add_header Cache-Control "no-cache" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
        }

        # sw.js 禁长缓存：精确匹配优先于下方 .js 正则，防止 SW 脚本被 7d immutable 吞掉。
        location = /sw.js {
            add_header Cache-Control "no-cache" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
        }

        # 静态资源缓存策略
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            # 继承 CORS 头
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
        }

        # WASM 文件特殊处理
        location ~* \.wasm$ {
            types { application/wasm wasm; }
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
        }
    }

    # ========== 共享数据目录 ==========
    location /data/ {
        # ========== 修改此处为实际数据目录 ==========
        alias /var/www/chexian/shared-data/;

        # 允许目录浏览（可选，方便调试）
        # autoindex on;

        # Parquet 文件 MIME 类型
        types {
            application/octet-stream parquet;
        }

        # CORS 头（数据文件也需要）
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # 禁用缓存（确保数据更新后立即生效）
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ========== 健康检查端点 ==========
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ========== 错误页面 ==========
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

