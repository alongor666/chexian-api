# ============================================================
# 车险业务分析系统 - Nginx 前后端分离部署配置
# ============================================================
# 架构说明：
#   - 前端静态文件：/var/www/chexian/frontend/dist
#   - 后端 API：http://localhost:3000 (Node.js + Express)
#   - 数据文件：/var/www/chexian/server/data
#
# 使用方法：
# 1. 复制此文件到 /etc/nginx/sites-available/chexian
# 2. 修改 server_name 为实际服务器 IP
# 3. 创建软链接: ln -s /etc/nginx/sites-available/chexian /etc/nginx/sites-enabled/
# 4. 测试并重启: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# 后端 API 上游服务器
upstream chexian_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;

    # ========== 修改此处为你的服务器 IP ==========
    server_name YOUR_SERVER_IP;

    # ========== 内网 IP 白名单（安全限制） ==========
    # 仅允许公司内网访问
    allow 192.168.0.0/16;    # 192.168.x.x 网段
    allow 10.0.0.0/8;        # 10.x.x.x 网段
    allow 172.16.0.0/12;     # 172.16.x.x - 172.31.x.x 网段
    allow 127.0.0.1;         # 本机
    deny all;                # 拒绝其他所有 IP

    # ========== 日志配置 ==========
    access_log /var/log/nginx/chexian_access.log;
    error_log /var/log/nginx/chexian_error.log;

    # ========== Gzip 压缩（API JSON + 静态资源） ==========
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types application/json text/plain text/css application/javascript application/xml text/xml;

    # ========== DuckDB-WASM 必需的 CORS 头 ==========
    # 前端 Local 模式（降级方案）需要这些头
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ========== 后端 API 反向代理 ==========
    location /api/ {
        proxy_pass http://chexian_api;
        proxy_http_version 1.1;

        # WebSocket 支持（如需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # 传递客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置（查询可能较慢）
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 32k;

        # 由后端 ETag/Cache-Control 控制缓存策略
        proxy_pass_header Cache-Control;
        proxy_pass_header ETag;
    }

    # ========== 后端健康检查 ==========
    location /health {
        proxy_pass http://chexian_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ========== 报告托管鉴权（B336：堵 Nginx 静态 /reports/* 零鉴权暴露） ==========
    # /reports/* 是 daily.mjs 生成、sync-vps 推送到 dist/reports/ 的诊断报告 HTML
    # （含保费/赔付/出险敏感数据，前端 ReportEntryCard 用 /reports/<slug>/<file> 直链）。
    # 原 location / 的 try_files 会无鉴权静态伺服 → 任意未登录用户可凭 URL 下载（latent CRITICAL）。
    # 本块用 auth_request 把 JWT cookie 转发到 Express /api/auth/me 校验登录态，未登录 → 401。
    location /reports/ {
        auth_request /__report_auth;
        root /var/www/chexian/frontend/dist;
        try_files $uri $uri/ =404;
        add_header Cache-Control "private, no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # auth_request 内部端点：转发 Cookie 到 Express，已登录返回 200 / 未登录 401
    location = /__report_auth {
        internal;
        proxy_pass http://chexian_api/api/auth/me;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    # ========== 前端静态文件 ==========
    # 注：HTML 报告走上面的 location /reports/（auth_request 鉴权），不是 /api/reports/。
    location / {
        root /var/www/chexian/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存策略
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            # 继承 CORS 头
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
        }

        # WASM 文件特殊处理
        location ~* \.wasm$ {
            types { application/wasm wasm; }
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
        }
    }

    # ========== 共享数据目录（Local 模式降级使用） ==========
    location /data/ {
        alias /var/www/chexian/server/data/;

        # Parquet 文件 MIME 类型
        types {
            application/octet-stream parquet;
        }

        # CORS 头
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # 禁用缓存
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ========== 错误页面 ==========
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ========== 文件上传大小限制 ==========
    client_max_body_size 100M;
}

