# ============================================================
# 车险业务分析系统 - Nginx 前后端分离部署配置
# ============================================================
# 架构说明：
#   - 前端静态文件：/var/www/chexian/frontend/dist
#   - 后端 API：http://localhost:3000 (Node.js + Express)
#   - 数据文件：/var/www/chexian/server/data
#
# 使用方法：
# 1. 复制此文件到 /etc/nginx/sites-available/chexian
# 2. 修改 server_name 为实际服务器 IP
# 3. 创建软链接: ln -s /etc/nginx/sites-available/chexian /etc/nginx/sites-enabled/
# 4. 测试并重启: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# 后端 API 上游服务器
upstream chexian_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;

    # ========== 修改此处为你的服务器 IP ==========
    server_name YOUR_SERVER_IP;

    # ========== 内网 IP 白名单（安全限制） ==========
    # 仅允许公司内网访问
    allow 192.168.0.0/16;    # 192.168.x.x 网段
    allow 10.0.0.0/8;        # 10.x.x.x 网段
    allow 172.16.0.0/12;     # 172.16.x.x - 172.31.x.x 网段
    allow 127.0.0.1;         # 本机
    deny all;                # 拒绝其他所有 IP

    # ========== 日志配置 ==========
    access_log /var/log/nginx/chexian_access.log;
    error_log /var/log/nginx/chexian_error.log;

    # ========== Gzip 压缩（API JSON + 静态资源） ==========
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types application/json text/plain text/css application/javascript application/xml text/xml;

    # 直接吃构建期预压缩产物（vite compression 插件产出 .gz，见 vite.config.ts）：
    # 免去运行时压缩 CPU，且压缩率更高。文件不存在时自动回落 gzip on 动态压缩。
    # 注：.br（brotli）产物需 ngx_brotli 模块（brotli_static on），标准 nginx 无此模块，
    # 装了再启用；未启用时 .br 文件闲置无害。BACKLOG 2026-07-03-claude-0e0e9f。
    gzip_static on;

    # ========== DuckDB-WASM 必需的 CORS 头 ==========
    # 前端 Local 模式（降级方案）需要这些头
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ========== 后端 API 反向代理 ==========
    location /api/ {
        proxy_pass http://chexian_api;
        proxy_http_version 1.1;

        # WebSocket 支持（如需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # 传递客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置（查询可能较慢）
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 32k;

        # 由后端 ETag/Cache-Control 控制缓存策略
        proxy_pass_header Cache-Control;
        proxy_pass_header ETag;
    }

    # ========== 后端健康检查 ==========
    location /health {
        proxy_pass http://chexian_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ========== 报告托管鉴权（B336：堵 Nginx 静态 /reports/* 零鉴权暴露） ==========
    # /reports/* 是 daily.mjs 生成、sync-vps 推送到 dist/reports/ 的诊断报告 HTML
    # （含保费/赔付/出险敏感数据，前端 ReportEntryCard 用 /reports/<slug>/<file> 直链）。
    # 原 location / 的 try_files 会无鉴权静态伺服 → 任意未登录用户可凭 URL 下载（latent CRITICAL）。
    # 本块用 auth_request 把 JWT cookie 转发到 Express /api/auth/me 校验登录态，未登录 → 401。
    location /reports/ {
        auth_request /__report_auth;
        root /var/www/chexian/frontend/dist;
        try_files $uri $uri/ =404;
        add_header Cache-Control "private, no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # auth_request 内部端点：转发 Cookie 到 Express，已登录返回 200 / 未登录 401
    location = /__report_auth {
        internal;
        proxy_pass http://chexian_api/api/auth/me;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    # ========== 前端静态文件 ==========
    # 注：HTML 报告走上面的 location /reports/（auth_request 鉴权），不是 /api/reports/。
    location / {
        root /var/www/chexian/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # index.html 禁长缓存（no-cache = 可存储但每次须带 ETag 校验）：
        # chunk 文件名靠 hash 换新，index.html 必须每次拿最新，否则部署后
        # 旧 index 引用已被 rm -rf 删除的旧 hash chunk → 404 白屏且用户无法自愈。
        # try_files 兜底与 index 指令均走 nginx 内部重定向、会重新匹配到本块。
        # BACKLOG 2026-07-03-claude-0f86cb。
        location = /index.html {
            add_header Cache-Control "no-cache" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            # 内容安全策略（CSP）：SPA 文档纵深防御（安全审计 M2 · 2026-07-03）。
            # SPA 客户端路由经 try_files 内部重定向到 /index.html 也命中本块，覆盖全部文档响应。
            # 口径对齐 Express helmet（config/csp.ts）：connect-src 含智谱/openrouter AI 域，
            # img blob/data 供 ECharts 画布导出，style unsafe-inline 供内联样式，font 白名单 Google Fonts。
            # script-src 暂留 'unsafe-inline'（与 Express 一致的基线）；收紧到 nonce/hash 见 BACKLOG L2。
            # ⚠ 本文件是参考模板（deploy.yml 不部署 nginx）；生产落地须在 conf.d/chexian.conf 监控窗口
            #   应用并对照已构建 SPA 验证不白屏（BACKLOG 2026-07-03-claude-6ef9cd）。
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://open.bigmodel.cn https://openrouter.ai; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;
        }

        # sw.js 禁长缓存：Service Worker 脚本被 immutable 长缓存会让 SW 逻辑
        # 修复最长延迟 24h（浏览器规范兜底）才到达用户；精确匹配优先于下方
        # .js 正则，防止被吞进 7d immutable（生产曾实测 sw.js 被一年强缓存）。
        location = /sw.js {
            add_header Cache-Control "no-cache" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
        }

        # 静态资源缓存策略
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            # 继承 CORS 头
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
        }

        # WASM 文件特殊处理
        location ~* \.wasm$ {
            types { application/wasm wasm; }
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
        }
    }

    # ========== 共享数据目录（Local 模式降级使用） ==========
    location /data/ {
        alias /var/www/chexian/server/data/;

        # Parquet 文件 MIME 类型
        types {
            application/octet-stream parquet;
        }

        # CORS 头
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # 禁用缓存
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ========== 错误页面 ==========
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ========== 文件上传大小限制 ==========
    # 唯一事实源 = server/src/config/env.ts dbEnv.MAX_UPLOAD_SIZE_MB（默认 200MB）。
    # nginx 静态模板不读 Node env，本值必须与该默认手工对齐；
    # governance「上传上限对齐」闸逐字节校验三处（此处 / env.ts / multer / 安全清单文档）防漂移。
    # 生产有效上限由 nginx 先于 Express 拒绝决定，故此值 == multer 上限。
    client_max_body_size 200M;
}

# ============================================================
