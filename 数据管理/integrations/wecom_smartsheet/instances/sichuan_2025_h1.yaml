# 四川 2025 上半年起保商业险续保追踪
#
# 起期 2025-01-01 ~ 2025-06-30 → 续保起期 2026-01-01 ~ 2026-06-30
# 业务规则：原单（排除批单）+ 单 VIN 净保费 > 200 元
# 跨期重叠规则：H1∩H2 的 VIN 仅归 H1（起期最早归批）

instance_name: sichuan_2025_h1

webhook_env: WECOM_SMARTSHEET_WEBHOOK_SC_2025H1

batch_size: 100
sheet_records_per_minute_limit: 3000
doc_records_per_minute_limit: 10000
rate_limit_sleep_seconds: 60

filters:
  insurance_type: 商业保险
  insurance_start_date_from: '2025-01-01'
  insurance_start_date_to:   '2025-06-30'
  premium_gt: 200
  exclude_endorsement: true        # endorsement_no 非空 = 批单，剔除
  organization_in: null            # null=不按 policy.org_level_3 过滤；当前数据=全四川

quote_window_start: '2025-12-03'   # q_earliest/q_latest 用的报价时间下界

# 跨实例去重：在两个实例都"看见"同一 VIN 时，仅最早起期那批保留它
exclusive_vin_strategy: earliest_start_first

# 按字段注册表 key 启用代码写入的字段；表中"姓名"等人工列不在此（不写）
fields_enabled:
  - expiry_date
  - org_3_by_salesman
  - team_by_salesman
  - plate_no
  - vehicle_frame_no
  - salesman_name
  - customer_category
  - coverage_combination
  - is_quoted
  - prior_discount
  - prior_premium
  - quote_discount
  - quote_premium
  - is_renewed
  - renewal_mode
  - renewed_sign_date
  - earliest_quote_date
