# 邮政经代签单明细（2026-04-20 起）→ 企业微信智能表「车险业务员保单明细」
#
# 业务规则：agent_name LIKE '%邮政%' AND policy_date >= '2026-04-20'
# 同步粒度：保单号 + 车架号唯一。源清单中同一保单号+车架号可能出现重复行，
# 写企微前先按该组合聚合，防止同一保单同一车辆重复写入。
#
# 当前表：使用 .env.local:WECOM_SMARTSHEET_WEBHOOK_POSTAL_ALL 指向的新表 webhook。
# 注意：新表额外包含「业务员姓名」「投保人」「上传员工证明」「上传行驶证」等字段，
# 本同步仍只写入下方 field_mapping 声明的原 12 个字段，不写入新增字段。

instance_name: postal-policy-all-since-20260420
script: sync_filtered_policies.py        # daily.mjs 据此路由到非续保脚本；缺省则走 sync_renewal_v2.py

# 邮政只同步全量表。保留 all 实例名以复用既有 state，避免后续重复推送。
webhook_env: WECOM_SMARTSHEET_WEBHOOK_POSTAL_ALL

# 省份隔离（RED LINE data-pipeline.md）：本表是四川邮政表。B5 cutover 后 current/ 已从「顶层扁平
#   混放 SC+SX」迁移为省份子目录 current/SC/、current/SX/；山西亦有邮政/邮储经代、agent_name 同含
#   「邮政」，单靠 agent_name LIKE '%邮政%' 会混入山西行（隐式隔离失效，见 memory
#   fact-current-mixes-sc-sx-bare-glob）。故双保险：
#     - policy_glob 仅扫 current/SC/ 子目录 → 性能辅助（2026-07-08 随 B5 cutover 由旧 [!S]* 前缀
#       排除法改为子目录路径；旧写法在子目录布局下匹配 0 个文件，曾阻断 release:daily 企微同步）
#     - extra_where branch_code='SC' → 权威隔离保证
#   与 shanxi-postal-all.yaml（current/SX/*.parquet + branch_code='SX'）对称。
policy_glob: 数据管理/warehouse/fact/policy/current/SC/*.parquet

batch_size: 100
sheet_records_per_minute_limit: 3000

filters:
  agent_name_like: "%邮政%"
  policy_date_from: "2026-04-20"
  extra_where: "branch_code = 'SC'"

primary_key: policy_no

# 聚合规则：同一保单号 + 车架号只写一条，保费为组内源行求和。
# 修改本字段后必须跑 --rebuild-state 重建 state.json。
aggregate_key:
  - policy_no
  - vehicle_frame_no

# 复合主键：邮政表按保单号 + 车架号作为幂等键。
# 修改本字段后必须跑 --rebuild-state 重建 state.json。
composite_key:
  - policy_no
  - vehicle_frame_no

# 字段映射：SQL 输出列名（en） → 智能表 field_id
field_mapping:
  org_level_3:           fxxKfG      # 机构（TEXT）
  salesman_name:         fIRILE      # 业务员（TEXT）
  policy_date:           fK6Njt      # 签单日期（DATE_TIME, 毫秒 ts）
  plate_no:              fWbeil      # 车牌（TEXT）
  insurance_grade:       f1RB2K      # 风险等级（SINGLE_SELECT）
  premium:               fTHxjw      # 保费（NUMBER）
  commercial_pricing_factor: fMc5sO  # 自主系数（NUMBER；UI 预先调 3 位小数）
  insurance_start_date:  fKXu8z      # 起保日期（DATE_TIME, 毫秒 ts）
  vehicle_model:         ftlPvj      # 厂牌车型（TEXT）
  driver_age_group:      fm1Pg9      # 年龄分组（SINGLE_SELECT）
  vehicle_price_segment: f9W7Xr      # 车价分段（SINGLE_SELECT，SQL 派生）
  vehicle_age_group:     fkHRFt      # 车龄分段（SINGLE_SELECT，SQL 派生；fields.json 已注册）

# 智能表字段类型（用于格式化值）
field_types:
  fxxKfG: TEXT
  fIRILE: SINGLE_SELECT
  fK6Njt: DATE_TIME
  fWbeil: TEXT
  f1RB2K: SINGLE_SELECT
  fTHxjw: NUMBER
  fMc5sO: NUMBER
  fKXu8z: DATE_TIME
  ftlPvj: TEXT
  fm1Pg9: SINGLE_SELECT
  f9W7Xr: SINGLE_SELECT
  fkHRFt: SINGLE_SELECT

# 智能表字段中文 label（供 webhook payload 中 schema 字段使用；可省略则取 field_id）
field_labels:
  fxxKfG: 机构
  fIRILE: 业务员
  fK6Njt: 签单日期
  fWbeil: 车牌
  f1RB2K: 风险等级
  fTHxjw: 保费
  fMc5sO: 自主系数
  fKXu8z: 起保日期
  ftlPvj: 厂牌车型
  fm1Pg9: 年龄分组
  f9W7Xr: 车价分段
  fkHRFt: 车龄分段
